  theater, and creative expression.
  I also love wilderness canoe tripping and have spent the last several summers at Camp Wabun
  in Temagami, Ontario, where I built resilience, teamwork, and outdoor leadership skills.
  This site shares my academics, activities, and achievements as I prepare for college.
